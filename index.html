<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CareRoute - 訪問介護ルート最適化アプリ。職員のスキルと利用者のニーズをマッチングし、最適な訪問ルートをGoogle Map上に表示します。" />
  <title>CareRoute - 訪問介護ルート最適化</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <script type="module" crossorigin src="./assets/index-BV4Gqxqz.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-C0ZYPn8V.css">
</head>
<body>
  <div id="app">
    <!-- ログイン前: ログイン画面 -->
    <div id="login-screen" class="login-screen" style="display: none;">
      <div class="login-container">
        <div class="login-card">
          <div class="login-logo">
            <span class="material-icons-round logo-icon">route</span>
            <h1>CareRoute</h1>
            <p class="login-subtitle">訪問介護ルート最適化</p>
          </div>
          <button id="btn-google-login" class="btn btn-google">
            <svg viewBox="0 0 24 24" width="20" height="20" class="google-icon">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Googleアカウントでログイン
          </button>
          <div style="display:flex;align-items:center;gap:12px;margin:20px 0 16px">
            <div style="flex:1;height:1px;background:var(--border)"></div>
            <span style="color:var(--text-muted);font-size:.8rem">または</span>
            <div style="flex:1;height:1px;background:var(--border)"></div>
          </div>
          <button id="btn-demo-mode" class="btn btn-secondary" style="width:100%;justify-content:center;padding:12px">
            <span class="material-icons-round">science</span>
            デモモードで試す（ログイン不要）
          </button>
          <p class="login-note">※ 管理者に登録されたアカウントのみアクセス可能です</p>
        </div>
      </div>
    </div>

    <!-- ログイン後: メインアプリ -->
    <div id="main-app" class="main-app" style="display: none;">
      <!-- サイドバー -->
      <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <span class="material-icons-round logo-icon-sm">route</span>
          <span class="sidebar-title">CareRoute</span>
          <button id="btn-sidebar-toggle" class="btn-icon sidebar-toggle">
            <span class="material-icons-round">menu</span>
          </button>
        </div>
        <ul class="sidebar-nav">
          <li class="nav-item active" data-page="dashboard">
            <span class="material-icons-round">dashboard</span>
            <span class="nav-label">ダッシュボード</span>
          </li>
          <li class="nav-item" data-page="map">
            <span class="material-icons-round">map</span>
            <span class="nav-label">マップビュー</span>
          </li>
          <li class="nav-item" data-page="staff">
            <span class="material-icons-round">badge</span>
            <span class="nav-label">職員管理</span>
          </li>
          <li class="nav-item" data-page="client">
            <span class="material-icons-round">elderly</span>
            <span class="nav-label">利用者管理</span>
          </li>
          <li class="nav-item" data-page="schedule">
            <span class="material-icons-round">calendar_month</span>
            <span class="nav-label">スケジュール</span>
          </li>
          <li class="nav-item" data-page="matching">
            <span class="material-icons-round">auto_fix_high</span>
            <span class="nav-label">マッチング＆最適化</span>
          </li>
        </ul>
        <div class="sidebar-footer">
          <div class="user-info">
            <img id="user-avatar" class="user-avatar" src="" alt="ユーザー" />
            <span id="user-name" class="user-name">ユーザー</span>
          </div>
          <button id="btn-logout" class="btn-icon" title="ログアウト">
            <span class="material-icons-round">logout</span>
          </button>
        </div>
      </nav>

      <!-- メインコンテンツ -->
      <main id="main-content" class="main-content">
        <div id="page-container" class="page-container">
          <!-- 各ページがここに動的に挿入される -->
        </div>
      </main>
    </div>

    <!-- トースト通知 -->
    <div id="toast-container" class="toast-container"></div>

    <!-- モーダル -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
      <div id="modal-content" class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title" class="modal-title"></h2>
          <button id="btn-modal-close" class="btn-icon">
            <span class="material-icons-round">close</span>
          </button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-footer" class="modal-footer"></div>
      </div>
    </div>
  </div>

</body>
</html>
